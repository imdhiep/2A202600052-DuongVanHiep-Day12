services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: 8000
      REDIS_URL: redis://redis:6379/0
      WEB_CONCURRENCY: 2
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - agent_net

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - agent_net

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - agent
    ports:
      - "18000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - agent_net

volumes:
  redis_data:

networks:
  agent_net:
    driver: bridge
